services:
  matrix-inline:
    image: ${MATRIX_INLINE_IMAGE:-ghcr.io/inline-chat/matrix-inline:latest}
    init: true
    environment:
      RUST_LOG: info
      INLINE_SIDECAR_BIND: 127.0.0.1:29342
      INLINE_SIDECAR_URL: http://127.0.0.1:29342
      INLINE_CLIENT_STORE: /data/inline-client/inline-client.sqlite3
      INLINE_API_BASE_URL: ${INLINE_API_BASE_URL:-https://api.inline.chat/v1}
      INLINE_REALTIME_URL: ${INLINE_REALTIME_URL:-wss://api.inline.chat/realtime}
      MATRIX_INLINE_DB_URI: file:/data/matrix-inline.db?_txlock=immediate
      MATRIX_INLINE_HOMESERVER_ADDRESS: ${MATRIX_INLINE_HOMESERVER_ADDRESS:-}
      MATRIX_INLINE_HOMESERVER_DOMAIN: ${MATRIX_INLINE_HOMESERVER_DOMAIN:-}
      MATRIX_INLINE_APPSERVICE_ADDRESS: ${MATRIX_INLINE_APPSERVICE_ADDRESS:-}
      MATRIX_INLINE_APPSERVICE_HOSTNAME: ${MATRIX_INLINE_APPSERVICE_HOSTNAME:-0.0.0.0}
      MATRIX_INLINE_NETWORK_DISPLAYNAME: ${MATRIX_INLINE_NETWORK_DISPLAYNAME:-}
      MATRIX_INLINE_NETWORK_URL: ${MATRIX_INLINE_NETWORK_URL:-}
      MATRIX_INLINE_NETWORK_ICON: ${MATRIX_INLINE_NETWORK_ICON:-}
      MATRIX_INLINE_BOT_DISPLAYNAME: ${MATRIX_INLINE_BOT_DISPLAYNAME:-}
      MATRIX_INLINE_BOT_AVATAR: ${MATRIX_INLINE_BOT_AVATAR:-}
    ports:
      - "29343:29343"
    volumes:
      - ./data:/data
    restart: unless-stopped
